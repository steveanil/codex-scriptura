name: Deploy

# Deploys main to Cloudflare Pages (pilot distribution - docs/pilot-testing.md).
# The data pipeline runs in CI because static/data/ is gitignored: the deployed
# site must carry the processed JSON the client seeds from. Raw source
# downloads are cached; the fetch scripts skip files that already exist, so a
# warm run only re-imports and re-copies.
#
# Requires two repository secrets:
#   CLOUDFLARE_API_TOKEN  - API token with the "Cloudflare Pages - Edit" permission
#   CLOUDFLARE_ACCOUNT_ID - from the Cloudflare dashboard (Workers & Pages overview)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache raw data sources
        uses: actions/cache@v4
        with:
          path: |
            data/texts
            data/theographic
          key: source-data-${{ hashFiles('packages/data-pipeline/src/fetch-*.ts') }}

      - name: Run data pipeline (fetch, import, copy to static)
        run: pnpm --dir packages/data-pipeline run setup

      - name: Build Application
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=codex-scriptura --branch=main
